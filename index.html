

<!DOCTYPE html>

<html>

<head>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Arvo:wght@400;700&display=swap" rel="stylesheet">

<style>


body{
  margin:0;
  background:#f8f5f5;
  font-family:'Arvo', serif;
  font-size:14px;
}



table{
  border-collapse:collapse;
  table-layout:fixed;
  width:auto;
}

tr:nth-child(even) td{
  background:#f1eeeb;
}

tr:nth-child(odd) td{
  background:#e4dedc;
}

td,
th{
  overflow:visible;
}

th{
  background:#dcc7d0;
  color:white;
  font-size:14px;
  font-weight:bold;

  position:sticky;
  top:0;
  z-index:100;
}

/* A */
th:nth-child(1), td:nth-child(1){ width:67px; }
td:nth-child(1) input{
  color:#6a6059;
  font-weight:bold;
}

/* Date */
th:nth-child(2),
td:nth-child(2){
  width:120px;
}
td:nth-child(2) input{
  color:#857970;
}

td:nth-child(3) input,
td:nth-child(4) input,
td:nth-child(5) input,
td:nth-child(6) input,
td:nth-child(7) input{
  color:#a09086;
}

/* In */
th:nth-child(3),
td:nth-child(3){
  width:90px;
}

/* Out */
th:nth-child(4),
td:nth-child(4){
  width:90px;
}

/* Plan Out */
th:nth-child(5),
td:nth-child(5){
  width:100px;
}

/* Go */
th:nth-child(6),
td:nth-child(6){
  width:90px;
}

/* Ret */
th:nth-child(7),
td:nth-child(7){
  width:90px;
}

/* H */
th:nth-child(8), td:nth-child(8){ width:96px; }

/* I */
th:nth-child(9), td:nth-child(9){ width:103px; }

td:nth-child(10),
td:nth-child(11),
td:nth-child(12),
td:nth-child(13){
  color:#857970;
}

/* J */
th:nth-child(10), td:nth-child(10){ width:74px; }

/* K */
th:nth-child(11), td:nth-child(11){ width:94px; }

/* L */
th:nth-child(12), td:nth-child(12){ width:61px; }

/* M */
th:nth-child(13), td:nth-child(13){ width:94px; }


/* N */
td:nth-child(14) input{
  color:#cdc6c3;
  font-style:italic;
  overflow:hidden;
  text-overflow:ellipsis;
  white-space:nowrap;
}


td{
  height:28px;
  border:1px solid #d9d3d3;
  padding:4px 8px;
  white-space:nowrap;
}


input{
  width:100%;
  box-sizing:border-box;
  border:none;
  background:transparent;
  font:inherit;
  padding:0;
}


button{
  margin:12px 6px;
  padding:8px 14px;
  border:none;
  border-radius:8px;
  background:#dcc7d0;
  color:white;
  font-family:'Arvo', serif;
  cursor:pointer;
}

.chip{
  display:inline-block;
  padding:2px 12px;
  border-radius:999px;
  color:white;
  font-size:14px;
}

.atelier{
  background:#e8d1ac;
}

.nydias{
  background:#cfb59e;
}

.home{
  background:#f6ead4;
}

.workday{
  background:#d2e2ec;
}

.offday{
  background:#adc2cf;
}

.worked{
  background:#b9d9fb;
}

.chip-select{

  border:none;

  border-radius:999px;

  padding:2px 10px;

  font-family:'Arvo', serif;

  color:white;

  cursor:pointer;

}

</style>

</head>



<body>



<button onclick="addRow()">
+ Add Row
</button>

<button onclick="refreshTable()">
⟳
</button>

<table id="table"></table>



<script>

const API_URL = https://script.google.com/macros/s/AKfycbzhsTnHRbUY2vP8OoDDSERi6z33DwZ9WQtvxX78JsrmzDFk7SuiDNwa2YTcV95i_T3o/exec

fetch(API_URL + "?action=getData")
  .then(r => r.json())
  .then(renderTable);

function renderTable(data){

  const table = document.getElementById("table");

  let html = "";

  data.forEach((row,rowIndex)=>{

    html += "<tr>";

    row.forEach((cell,colIndex)=>{

      if(rowIndex===0){

        html += `<th>${cell}</th>`;

      } else {
        if ([9,10,11,12].includes(colIndex)) {

          html += `
            <td>
              ${cell}
            </td>
          `;

        } else if (colIndex === 7) {

          html += `
            <td>
              <select
                class="chip-select where-select"
                onchange="save(${rowIndex+1},${colIndex+1},this.value)">

                <option value="Atelier" ${cell==="Atelier"?"selected":""}>Atelier</option>

                <option value="Home" ${cell==="Home"?"selected":""}>Home</option>

                <option value="Nydia's" ${cell==="Nydia's"?"selected":""}>Nydia's</option>

              </select>
            </td>
          `;

        } else if (colIndex === 8) {

          html += `
            <td>
              <select
                class="chip-select work-select"
                onchange="save(${rowIndex+1},${colIndex+1},this.value)">

                <option value="workday" ${cell==="workday"?"selected":""}>workday</option>

                <option value="off-day" ${cell==="off-day"?"selected":""}>off-day</option>

                <option value="worked" ${cell==="worked"?"selected":""}>worked</option>

              </select>
            </td>
          `;
        } else {

          html += `
            <td>
              <input
                value="${cell}"
                onchange="save(${rowIndex+1},${colIndex+1},this.value)">
            </td>
          `;
        }
      }

    });

    html += "</tr>";

  });

  table.innerHTML = html;
  updateChipColors();
}



function save(row,col,value){

  fetch(
    API_URL +
    "?action=updateCell" +
    "&row=" + row +
    "&col=" + col +
    "&value=" + encodeURIComponent(value)
  );

}



function addRow(){

  fetch(API_URL + "?action=addRow")
    .then(() => refreshTable());

}

function updateChipColors(){

  document.querySelectorAll(".where-select").forEach(select=>{

    if(select.value==="Atelier")
      select.style.background="#e8d1ac";

    if(select.value==="Home")
      select.style.background="#f6ead4";

    if(select.value==="Nydia's")
      select.style.background="#cfb59e";

  });

  document.querySelectorAll(".work-select").forEach(select=>{

    if(select.value==="workday")
      select.style.background="#d2e2ec";

    if(select.value==="off-day")
      select.style.background="#adc2cf";

    if(select.value==="worked")
      select.style.background="#b9d9fb";

  });

}

function refreshTable(){

  fetch(API_URL + "?action=getData")
    .then(r => r.json())
    .then(renderTable);

}

</script>



</body>

</html>
